apiVersion: v1
kind: Pod
metadata:
  name: gvisor-smoke
  namespace: gvisor-install
spec:
  runtimeClassName: gvisor
  restartPolicy: Never
  nodeSelector:
    kubernetes.azure.com/agentpool: __GVISOR_NODEPOOL_NAME__
  tolerations:
    - key: gvisor
      operator: Equal
      value: "true"
      effect: NoSchedule
  containers:
    - name: smoke
      image: python:3.12-slim
      command: ["sleep", "300"]
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 100m
          memory: 128Mi
