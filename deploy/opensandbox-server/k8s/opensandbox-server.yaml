apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensandbox-server
  namespace: __NAMESPACE__
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: opensandbox-sandbox-quota
  namespace: __NAMESPACE__
spec:
  hard:
    pods: "20"
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: opensandbox-sandbox-limits
  namespace: __NAMESPACE__
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      default:
        cpu: "1"
        memory: "1Gi"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opensandbox-server
  namespace: __NAMESPACE__
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["sandbox.opensandbox.io"]
    resources: ["batchsandboxes", "batchsandboxes/status", "pools", "sandboxsnapshots"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opensandbox-server-runtimeclass-reader-__NAMESPACE__
rules:
  - apiGroups: ["node.k8s.io"]
    resources: ["runtimeclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opensandbox-server-runtimeclass-reader-__NAMESPACE__
subjects:
  - kind: ServiceAccount
    name: opensandbox-server
    namespace: __NAMESPACE__
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opensandbox-server-runtimeclass-reader-__NAMESPACE__
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opensandbox-server
  namespace: __NAMESPACE__
subjects:
  - kind: ServiceAccount
    name: opensandbox-server
    namespace: __NAMESPACE__
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opensandbox-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensandbox-server
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: opensandbox-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensandbox-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensandbox-server
    spec:
      serviceAccountName: opensandbox-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: opensandbox-server-config
        - name: batchsandbox-template
          configMap:
            name: opensandbox-batchsandbox-template
        - name: tmp
          emptyDir: {}
      containers:
        - name: server
          image: __SERVER_IMAGE__
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          env:
            - name: OPENSANDBOX_SERVER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opensandbox-server
                  key: api-key
          volumeMounts:
            - name: config
              mountPath: /app/sandbox.toml
              subPath: sandbox.toml
              readOnly: true
            - name: batchsandbox-template
              mountPath: /app/batchsandbox-template.yaml
              subPath: batchsandbox-template.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: opensandbox-server
  namespace: __NAMESPACE__
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opensandbox-server
  ports:
    - name: http
      port: 8080
      targetPort: http
