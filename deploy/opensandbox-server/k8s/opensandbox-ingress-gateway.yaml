apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensandbox-ingress-gateway
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: opensandbox-ingress-gateway
    app.kubernetes.io/part-of: opensandbox
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opensandbox-ingress-gateway-reader-__NAMESPACE__
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: opensandbox-ingress-gateway
    app.kubernetes.io/part-of: opensandbox
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/status", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["sandbox.opensandbox.io"]
    resources: ["batchsandboxes", "batchsandboxes/status"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opensandbox-ingress-gateway-reader-__NAMESPACE__
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: opensandbox-ingress-gateway
    app.kubernetes.io/part-of: opensandbox
subjects:
  - kind: ServiceAccount
    name: opensandbox-ingress-gateway
    namespace: __NAMESPACE__
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opensandbox-ingress-gateway-reader-__NAMESPACE__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensandbox-ingress-gateway
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: opensandbox-ingress-gateway
    app.kubernetes.io/component: ingress-gateway
    app.kubernetes.io/part-of: opensandbox
spec:
  replicas: __GATEWAY_REPLICAS__
  selector:
    matchLabels:
      app.kubernetes.io/name: opensandbox-ingress-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensandbox-ingress-gateway
        app.kubernetes.io/component: ingress-gateway
        app.kubernetes.io/part-of: opensandbox
    spec:
      serviceAccountName: opensandbox-ingress-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: __GATEWAY_IMAGE__
          imagePullPolicy: IfNotPresent
          args:
            - "--namespace=__NAMESPACE__"
            - "--port=28888"
            - "--provider-type=batchsandbox"
            - "--mode=__GATEWAY_ROUTE_MODE__"
            - "--log-level=info"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 28888
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /status.ok
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /status.ok
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: opensandbox-ingress-gateway
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: opensandbox-ingress-gateway
    app.kubernetes.io/component: ingress-gateway
    app.kubernetes.io/part-of: opensandbox
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opensandbox-ingress-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
