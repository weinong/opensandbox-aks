apiVersion: v1
kind: Namespace
metadata:
  name: firecracker-smoke
---
apiVersion: v1
kind: Pod
metadata:
  name: kata-fc-smoke
  namespace: firecracker-smoke
spec:
  runtimeClassName: kata-fc
  tolerations:
    - key: firecracker
      operator: Equal
      value: "true"
      effect: NoSchedule
  restartPolicy: Never
  containers:
    - name: smoke
      image: python:3.12-slim
      imagePullPolicy: Never
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
