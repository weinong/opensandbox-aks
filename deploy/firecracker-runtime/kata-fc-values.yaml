nodeSelector:
  kubernetes.azure.com/agentpool: __FIRECRACKER_NODEPOOL_NAME__

tolerations:
  - key: firecracker
    operator: Equal
    value: "true"
    effect: NoSchedule

snapshotter:
  setup: []

shims:
  disableAll: true
  fc:
    enabled: true
    containerd:
      snapshotter: devmapper

runtimeClasses:
  enabled: true
  createDefault: false

defaultShim:
  amd64: fc
